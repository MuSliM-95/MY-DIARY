user root; # пользователь, от имени которого работает Nginx

worker_processes auto; # количество рабочих процессов Nginx

events {
    worker_connections 1024; # максимальное количество соединений на процесс
}

http {
    include /etc/nginx/mime.types; # ОБЯЗАТЕЛЬНО ДОБАВИТЬ
    default_type application/octet-stream;

    # Оптимизация передачи статических файлов.
    sendfile on;
    tcp_nopush on;
    include /etc/nginx/gzip.conf;

    # Настройки SSL-сессий для ускорения повторных HTTPS-подключений.
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Запрещаем браузеру самостоятельно определять MIME-тип файла.
    # Это защищает от выполнения файлов как JavaScript, если сервер
    # указал для них другой Content-Type.
    add_header X-Content-Type-Options nosniff always;

    # Запрещаем открывать сайт внутри iframe на других доменах.
    # Защищает от Clickjacking-атак.
    # SAMEORIGIN разрешает iframe только для этого же домена.
    add_header X-Frame-Options SAMEORIGIN always;

    # Ограничиваем передачу Referer при переходе на другие сайты.
    # Другой сайт увидит только домен, а не полный URL с путями
    # и параметрами запроса.
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Настройки Keep-Alive для клиентских соединений.
    keepalive_timeout 65s;
    keepalive_requests 1000;


    # Соединение с контейнером Next.js.
    # Keep-Alive уменьшает количество повторных TCP-подключений.
    upstream frontend_upstream {
        server frontend:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name your-diary.ru www.your-diary.ru;


        location / {
            return 301 https://your-diary.ru$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name www.your-diary.ru;


        ssl_certificate /etc/letsencrypt/live/your-diary.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-diary.ru/privkey.pem;

        return 301 https://your-diary.ru$request_uri;
    }

    # --- HTTPS сервер ---
    server {
        listen 443 ssl;
        http2 on; # слушаем HTTPS порт

        server_name your-diary.ru; # имя сервера

        limit_conn_status 429;
        # root /srv/public;            # корневая папка для статики
        server_tokens off; # отключаем показ версии Nginx (безопасность)

        # Пути к SSL сертификатам
        ssl_certificate /etc/letsencrypt/live/your-diary.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-diary.ru/privkey.pem;

        # --- Локация для статики Next.js с кэшированием ---
        location /_next/static/ {
            proxy_pass http://frontend_upstream;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # --- Internal location для фронтенда (Next.js) ---
        location / {
            # Используем HTTP/1.1 для поддержки keepalive с upstream.
            # Без этого Nginx может открывать новое соединение к Next.js
            # для каждого запроса.
            proxy_http_version 1.1;

            # Не отправляем заголовок Connection, чтобы keepalive
            # между Nginx и Next.js работал корректно.
            proxy_set_header Connection "";

            # Максимальное время ожидания установления соединения
            # с контейнером Next.js.
            proxy_connect_timeout 5s;

            # Максимальное время ожидания ответа от Next.js.
            proxy_read_timeout 60s;

            # Это ограничивает время отправки запроса от Nginx к upstream.
            proxy_send_timeout 60s;

            # Передаём оригинальный Host (например your-diary.ru),
            # чтобы Next.js знал, к какому домену пришёл запрос.
            proxy_set_header Host $host;

            # Передаём реальный IP клиента.
            # Используется для логирования, rate limit и определения IP пользователя.
            proxy_set_header X-Real-IP $remote_addr;

            # Передаём исходный Host через стандартный proxy-заголовок.
            # Некоторые приложения используют именно его.
            proxy_set_header X-Forwarded-Host $host;

            # Передаём цепочку IP-адресов клиента через все прокси.
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Сообщаем приложению, что пользователь подключился по HTTPS,
            # даже несмотря на то, что между Nginx и Next.js используется HTTP.
            proxy_set_header X-Forwarded-Proto https;

            # Не изменяем заголовок Location в ответах от Next.js.
            proxy_redirect off;

            # Передаём запрос в контейнер Next.js.
            proxy_pass http://frontend_upstream;

        }
    }
}