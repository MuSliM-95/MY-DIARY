services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracker
    networks:
      - dev
    volumes:
      - data:/opt/app/data

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./nginx/gzip.conf:/etc/nginx/gzip.conf:ro # монтируем gzip файл внутрь контейнера
      - ./nginx/${NGINX_CONFIG:-nginx.conf}:/etc/nginx/nginx.conf:ro

    depends_on:
      - frontend
    networks:
      - dev

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

networks:
  dev:
    driver: bridge

volumes:
  data:
